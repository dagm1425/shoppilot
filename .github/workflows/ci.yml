name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shoppilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d shoppilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shoppilot
      API_PORT: 4000
      SENTRY_ENABLED: "false"
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:4000
      NEXT_PUBLIC_SENTRY_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma migrate deploy
        run: pnpm --filter @shoppilot/db prisma:deploy

      - name: Seed baseline data
        run: pnpm --filter @shoppilot/db seed

      - name: Playwright browsers
        run: pnpm --filter @shoppilot/web exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Install AI dependencies
        run: python -m pip install -r apps/ai/requirements-dev.txt

      - name: Test AI service (pytest)
        run: pytest -q apps/ai/tests

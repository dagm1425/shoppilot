services:
  db:
    image: postgres:16-alpine
    container_name: shoppilot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shoppilot
    ports:
      - "5432:5432"
    volumes:
      - shoppilot-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shoppilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: shoppilot-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      API_PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/shoppilot
      SENTRY_ENABLED: "false"
      SENTRY_DSN: ""
    ports:
      - "4000:4000"

volumes:
  shoppilot-db-data:
